<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LumaPage AI — Landing pages com IA</title><style>
:root{--bg:#070a14;--panel:#0d1424;--panel2:#111b30;--line:rgba(255,255,255,.13);--text:#f8fbff;--muted:#a9b5d3;--brand:#8b5cf6;--cyan:#18d6ff;--ok:#24e68a;--warn:#ffd166;--bad:#ff5470;--r:26px}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at 10% 0,rgba(139,92,246,.45),transparent 30%),radial-gradient(circle at 90% 10%,rgba(24,214,255,.24),transparent 30%),linear-gradient(180deg,#050711,#0a1020 55%,#070a14);color:var(--text);min-height:100vh}body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:72px 72px;pointer-events:none}.wrap{width:min(1120px,calc(100% - 32px));margin:auto}.nav{display:flex;align-items:center;justify-content:space-between;padding:24px 0;gap:16px}.brand{display:flex;gap:14px;align-items:center}.logo{width:62px;height:62px;border-radius:18px;background:linear-gradient(135deg,var(--cyan),var(--brand) 60%,#ff4edb);display:grid;place-items:center;font-size:30px;font-weight:950;box-shadow:0 22px 60px rgba(139,92,246,.3)}h1,h2,h3,p{margin-top:0}.brand h1{font-size:28px;line-height:1;margin:0}.brand p{margin:4px 0 0;color:var(--muted);font-weight:800}.btn{border:0;border-radius:17px;padding:14px 18px;background:rgba(255,255,255,.08);color:#fff;font-weight:950;text-decoration:none;display:inline-flex;justify-content:center;align-items:center;gap:8px;box-shadow:inset 0 0 0 1px var(--line);cursor:pointer}.btn:hover{transform:translateY(-1px)}.primary{background:linear-gradient(135deg,var(--brand),var(--cyan));box-shadow:0 22px 60px rgba(24,214,255,.18)}.green{background:linear-gradient(135deg,#16c784,#24e68a);color:#062516}.danger{background:linear-gradient(135deg,#ff456c,#ff8a65)}.small{padding:9px 12px;border-radius:12px;font-size:13px}.hero{padding:30px 0 70px}.grid{display:grid;grid-template-columns:1.02fr .98fr;gap:26px;align-items:center}.badge{display:inline-flex;padding:12px 18px;border-radius:99px;background:rgba(255,255,255,.075);box-shadow:inset 0 0 0 1px var(--line);font-weight:950;color:#e7edff}.hero h2{font-size:clamp(46px,8vw,88px);line-height:.95;letter-spacing:-4px;margin:24px 0 22px}.grad{background:linear-gradient(135deg,#b6f7ff,#f58aff 58%,#ffd66b);-webkit-background-clip:text;background-clip:text;color:transparent}.hero p{font-size:22px;line-height:1.55;color:#c7d0e8}.actions{display:flex;gap:12px;flex-wrap:wrap}.panel,.card,.mock{background:linear-gradient(180deg,rgba(255,255,255,.095),rgba(255,255,255,.04));border:1px solid var(--line);border-radius:var(--r);box-shadow:0 25px 80px rgba(0,0,0,.32)}.mock{padding:16px}.browser{border-radius:22px;overflow:hidden;background:#07101e}.bar{height:48px;background:rgba(255,255,255,.07);display:flex;align-items:center;gap:8px;padding:0 16px}.dot{width:12px;height:12px;border-radius:50%;background:#ff5f56}.dot:nth-child(2){background:#ffbd2e}.dot:nth-child(3){background:#27c93f}.url{margin-left:10px;color:#91a4c8;font-weight:800}.dash{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:20px}.metric{background:rgba(255,255,255,.065);border:1px solid var(--line);border-radius:20px;padding:16px}.metric span{color:var(--muted);font-weight:800}.metric b{display:block;font-size:30px}.chart{grid-column:1/-1;height:175px;background:linear-gradient(180deg,rgba(24,214,255,.11),rgba(24,214,255,.03));border:1px solid var(--line);border-radius:22px;overflow:hidden}.row{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:13px;border-radius:17px;background:rgba(255,255,255,.055);border:1px solid var(--line);margin-top:10px}.status{background:var(--ok);color:#052816;border-radius:99px;padding:8px 12px;font-weight:950}.section{padding:62px 0}.section h2{text-align:center;font-size:clamp(34px,5vw,58px);letter-spacing:-2px}.lead{text-align:center;color:#c6cfe7;max-width:780px;margin:0 auto 30px;font-size:20px;line-height:1.5}.cards,.plans,.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.card,.panel{padding:22px}.card h3{font-size:24px}.ico{width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,var(--brand),var(--cyan));display:grid;place-items:center;font-size:25px;margin-bottom:14px}.muted{color:var(--muted)}.price{font-size:42px;font-weight:950;margin:12px 0}.pro{border-color:rgba(24,214,255,.45);box-shadow:0 28px 80px rgba(24,214,255,.12)}.footer{border-top:1px solid var(--line);padding:42px 0;color:#91a0be}.footrow{display:flex;justify-content:space-between;gap:18px;flex-wrap:wrap}.adminlink{color:#5f6d89;text-decoration:none}.screen{display:none;min-height:100vh;padding:24px 0 60px}.screen.active{display:block}.appbar{display:flex;justify-content:space-between;gap:14px;align-items:center;margin-bottom:18px}.form{display:grid;gap:14px}.input,select,textarea{width:100%;background:#07101e;border:1px solid rgba(255,255,255,.13);color:#fff;border-radius:16px;padding:15px;font-size:16px}label{font-weight:900;color:#d6ddef;display:grid;gap:7px}.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}.pass{position:relative}.eye{position:absolute;right:10px;bottom:8px;border:0;background:transparent;color:#fff;font-size:22px;padding:8px}.strength{height:7px;border-radius:99px;background:#1c263b;overflow:hidden}.strength i{display:block;height:100%;width:0;background:var(--bad);transition:.2s}.layout{display:grid;grid-template-columns:270px 1fr;gap:18px}.side{height:max-content;position:sticky;top:16px}.menu{display:grid;gap:8px;margin-top:18px}.menu button{justify-content:flex-start}.menu .active{background:linear-gradient(135deg,rgba(139,92,246,.78),rgba(24,214,255,.22))}.tab{display:none}.tab.active{display:block}.table{width:100%;border-collapse:separate;border-spacing:0 10px}.table th{text-align:left;color:#9eabc9;font-size:13px}.table td{background:rgba(255,255,255,.055);border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:13px}.table td:first-child{border-left:1px solid var(--line);border-radius:14px 0 0 14px}.table td:last-child{border-right:1px solid var(--line);border-radius:0 14px 14px 0}.empty{padding:24px;border:1px dashed rgba(255,255,255,.18);border-radius:20px;text-align:center;color:#aeb8d2}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:50;background:#101a2e;border:1px solid var(--line);padding:14px 18px;border-radius:16px;font-weight:950;display:none;max-width:92%;box-shadow:0 25px 70px #0008}.toast.show{display:block}.qrbox{background:#fff;color:#111;border-radius:22px;padding:18px;text-align:center}.published{background:#fff;color:#111;border-radius:24px;overflow:hidden}.pubhero{padding:50px;background:linear-gradient(135deg,#101827,#351e74);color:#fff}.pubbody{padding:28px}.pubcta{display:block;background:#24e68a;color:#052816;text-align:center;border-radius:16px;padding:15px;font-weight:950;text-decoration:none}@media(max-width:850px){.grid,.cards,.plans,.layout,.two{grid-template-columns:1fr}.nav{align-items:flex-start}.navlinks{display:none}.hero h2{font-size:48px;letter-spacing:-2px}.hero p{font-size:20px}.actions .btn{width:100%;font-size:18px;padding:18px}.dash,.stats{grid-template-columns:1fr}.menu{grid-template-columns:1fr 1fr}.table{font-size:13px}.wrap{width:min(100% - 28px,720px)}}
</style></head><body><div id="app"></div><div id="toast" class="toast"></div><script>
const API='/api/'; const ADMIN_EMAIL='Varejaoeverton@gmail.com'; const SUPPORT='81985745430';
let token=localStorage.lp_token||''; let user=null; let state={plans:[],projects:[],payments:[],admin:{}};
const $=s=>document.querySelector(s); const money=v=>Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); const toast=m=>{const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)};
async function api(path,opts={}){const headers={'content-type':'application/json'}; if(token)headers.authorization='Bearer '+token; const r=await fetch(API+path,{...opts,headers:{...headers,...opts.headers}}); let j; try{j=await r.json()}catch{throw new Error('Resposta inválida')}; if(!r.ok||j.ok===false) throw new Error(j.error||'Erro'); return j}
function passField(name,label='Senha',extra=''){return `<label>${label}<div class="pass"><input class="input pass-input" type="password" name="${name}" required ${extra} oninput="checkStrength(this)"><button class="eye" type="button" onclick="togglePass(this)">🙈</button></div><div class="strength"><i></i></div><small class="muted">Mínimo 8 caracteres: maiúscula, minúscula, número e símbolo.</small></label>`}
function togglePass(b){const i=b.parentElement.querySelector('input'); i.type=i.type==='password'?'text':'password'; b.textContent=i.type==='password'?'🙈':'👁️'}
function strong(p){return p.length>=8&&/[A-Z]/.test(p)&&/[a-z]/.test(p)&&/\d/.test(p)&&/[^A-Za-z0-9]/.test(p)}
function checkStrength(i){const bar=i.closest('label').querySelector('.strength i'); const p=i.value; let n=0; if(p.length>=8)n++; if(/[A-Z]/.test(p))n++; if(/[a-z]/.test(p))n++; if(/\d/.test(p))n++; if(/[^A-Za-z0-9]/.test(p))n++; bar.style.width=(n*20)+'%'; bar.style.background=n<3?'var(--bad)':n<5?'var(--warn)':'var(--ok)'}
function header(){return `<header class="wrap nav"><a class="brand" href="#home" style="color:#fff;text-decoration:none"><div class="logo">L</div><div><h1>LumaPage AI</h1><p>Landing pages com IA</p></div></a><div class="navlinks"><a class="btn" href="#login">Cliente entrar</a><a class="btn primary" href="#signup">Criar conta</a></div></header>`}
function footer(){return `<footer class="footer"><div class="wrap footrow"><div><b>LumaPage AI</b><br><span>Plataforma profissional de páginas com IA.</span></div><div style="display:flex;gap:16px;flex-wrap:wrap"><a class="adminlink" href="#admin">Admin</a><a class="adminlink" href="#login">Cliente entrar</a><a class="adminlink" href="https://wa.me/55${SUPPORT}" target="_blank">Suporte</a></div></div></footer>`}
function home(){return `${header()}<main><section class="wrap hero"><div class="grid"><div><span class="badge">Plataforma profissional para negócios venderem online</span><h2>Crie páginas de venda com <span class="grad">IA em minutos.</span></h2><p>Seu cliente informa o negócio, objetivo e contato. A plataforma cria uma landing page bonita, otimizada para conversão, com publicação rápida e painel para acompanhar resultados.</p><div class="actions"><a class="btn primary" href="#signup">Criar minha conta</a><a class="btn" href="#login">Cliente entrar</a><a class="btn green" href="https://wa.me/55${SUPPORT}" target="_blank">Suporte WhatsApp</a></div></div><div class="mock"><div class="browser"><div class="bar"><i class="dot"></i><i class="dot"></i><i class="dot"></i><span class="url">app.lumapage.ai/dashboard</span></div><div class="dash"><div class="metric"><span>Conversão</span><b>12,6%</b></div><div class="metric"><span>Leads</span><b>1.9k</b></div><div class="chart"><svg viewBox="0 0 700 210" preserveAspectRatio="none"><path d="M0 160 C90 130 110 95 200 105 C310 120 340 54 430 68 C520 82 550 37 700 45" stroke="#24e68a" stroke-width="9" fill="none" stroke-linecap="round"/><path d="M0 160 C90 130 110 95 200 105 C310 120 340 54 430 68 C520 82 550 37 700 45 L700 210 L0 210Z" fill="rgba(36,230,138,.16)"/></svg></div><div style="grid-column:1/-1"><div class="row"><b>Landing Barbearia Prime</b><span class="status">Ativa</span></div><div class="row"><b>Clínica Nova</b><span class="status">Ativa</span></div><div class="row"><b>Delivery Sabor</b><span class="status">Pronta</span></div></div></div></div></div></div></section><section class="section"><div class="wrap"><h2>Dashboard, PIX e páginas reais</h2><p class="lead">Tudo que o cliente precisa em uma plataforma com cara de SaaS premium.</p><div class="cards"><div class="card"><div class="ico">🔐</div><h3>Senha segura</h3><p class="muted">Cadastro com senha forte, olhinho, sessão e recuperação por e-mail.</p></div><div class="card"><div class="ico">💳</div><h3>PIX Mercado Pago</h3><p class="muted">QR Code e copia-e-cola para o cliente pagar diretamente no painel.</p></div><div class="card"><div class="ico">🌐</div><h3>Link público</h3><p class="muted">Cada página publicada ganha link próprio no formato /p/nome-do-cliente.</p></div></div></div></section><section class="section"><div class="wrap"><h2>Planos acessíveis</h2><p class="lead">Comece barato e aumente conforme o produto crescer.</p><div class="plans"><div class="card"><h3>Starter</h3><div class="price">R$ 9,90</div><p class="muted">1 página, PIX e suporte básico.</p></div><div class="card pro"><h3>Pro</h3><div class="price">R$ 19,90</div><p class="muted">5 páginas, IA premium, analytics e sem marca.</p></div><div class="card"><h3>Business</h3><div class="price">R$ 39,90</div><p class="muted">Páginas ilimitadas, domínio próprio e prioridade.</p></div></div></div></section></main>${footer()}`}
function signup(){return `${header()}<section class="screen active"><div class="wrap" style="max-width:760px"><div class="panel"><h2>Criar conta</h2><p class="muted">O cliente se cadastra, paga o plano e cria a landing page.</p><form class="form" onsubmit="doSignup(event)"><div class="two"><label>Nome<input class="input" name="name" required></label><label>WhatsApp<input class="input" name="phone" required placeholder="(81) 99999-9999"></label></div><label>E-mail<input class="input" type="email" name="email" required></label>${passField('password')}<label>Plano<select name="plan"><option value="starter">Starter — R$ 9,90</option><option value="pro">Pro — R$ 19,90</option><option value="business">Business — R$ 39,90</option></select></label><button class="btn primary" type="submit">Cadastrar</button><a class="btn" href="#login">Já tenho conta</a></form></div></div></section>${footer()}`}
function login(){return `${header()}<section class="screen active"><div class="wrap" style="max-width:660px"><div class="panel"><h2>Cliente entrar</h2><form class="form" onsubmit="doLogin(event)"><label>E-mail<input class="input" type="email" name="email" required></label>${passField('password','Senha','')}<button class="btn primary" type="submit">Entrar no dashboard</button><a class="btn" href="#forgot">Esqueci minha senha</a><a class="btn" href="#signup">Criar conta</a></form></div></div></section>${footer()}`}
function forgot(){return `${header()}<section class="screen active"><div class="wrap" style="max-width:660px"><div class="panel"><h2>Recuperar senha</h2><p class="muted">Digite seu e-mail. O sistema envia um link para criar uma nova senha.</p><form class="form" onsubmit="doForgot(event)"><label>E-mail<input class="input" type="email" name="email" required></label><button class="btn primary" type="submit">Enviar link</button><a class="btn" href="#login">Voltar</a></form><div id="devlink" class="muted" style="margin-top:16px"></div></div></div></section>${footer()}`}
function reset(tok){return `${header()}<section class="screen active"><div class="wrap" style="max-width:660px"><div class="panel"><h2>Nova senha</h2><form class="form" onsubmit="doReset(event,'${tok}')">${passField('password','Nova senha')}<button class="btn primary" type="submit">Salvar nova senha</button></form></div></div></section>${footer()}`}
async function doSignup(e){e.preventDefault();const d=Object.fromEntries(new FormData(e.target)); if(!strong(d.password))return toast('Senha fraca. Use maiúscula, minúscula, número e símbolo.'); try{const r=await api('auth/register',{method:'POST',body:JSON.stringify(d)}); token=r.token; localStorage.lp_token=token; user=r.user; location.hash='dashboard'}catch(err){toast(err.message)}}
async function doLogin(e){e.preventDefault();const d=Object.fromEntries(new FormData(e.target)); try{const r=await api('auth/login',{method:'POST',body:JSON.stringify(d)}); token=r.token; localStorage.lp_token=token; user=r.user; location.hash=user.role==='admin'?'admin-panel':'dashboard'}catch(err){toast(err.message)}}
async function doForgot(e){e.preventDefault();const d=Object.fromEntries(new FormData(e.target)); try{const r=await api('auth/forgot',{method:'POST',body:JSON.stringify(d)}); toast(r.message||'Enviado.'); if(r.dev_link)$('#devlink').innerHTML='Link de teste: <a style="color:#fff" href="'+r.dev_link+'">abrir redefinição</a>'}catch(err){toast(err.message)}}
async function doReset(e,t){e.preventDefault();const p=new FormData(e.target).get('password'); if(!strong(p))return toast('Senha fraca.'); try{await api('auth/reset',{method:'POST',body:JSON.stringify({token:t,password:p})}); toast('Senha alterada.'); location.hash='login'}catch(err){toast(err.message)}}
async function loadDash(){const r=await api('client/dashboard'); state={...state,...r}; user=r.user; return r}
async function dashboard(){try{await loadDash()}catch{location.hash='login';return ''} const projects=state.projects||[], pays=state.payments||[]; return `${header()}<section class="screen active"><div class="wrap"><div class="appbar"><div><h2>Dashboard do cliente</h2><p class="muted">Olá, ${user.name}. Gerencie páginas, plano e PIX.</p></div><button class="btn" onclick="logout()">Sair</button></div><div class="stats"><div class="card"><span class="muted">Páginas</span><h2>${projects.length}</h2></div><div class="card"><span class="muted">Visitas</span><h2>${projects.reduce((a,p)=>a+(p.visits||0),0)}</h2></div><div class="card"><span class="muted">Leads</span><h2>${projects.reduce((a,p)=>a+(p.leads||0),0)}</h2></div></div><br><div class="grid" style="align-items:start"><div class="panel"><h2>Gerar página com IA</h2><form class="form" onsubmit="createPage(event)"><label>Nome do negócio<input class="input" name="business" required placeholder="Ex: Barbearia Prime"></label><label>Segmento<select name="segment"><option>Barbearia</option><option>Clínica</option><option>Delivery</option><option>Loja</option><option>Curso</option><option>Serviços</option></select></label><label>Objetivo<textarea name="goal" rows="3" required placeholder="Atrair clientes pelo WhatsApp"></textarea></label><label>WhatsApp<input class="input" name="whats" value="${user.phone||''}" required></label><button class="btn primary">Gerar e publicar</button></form><hr style="border-color:var(--line);margin:22px 0"><h3>Pagar plano via PIX</h3><button class="btn green" onclick="createPix('${user.plan||'starter'}')">Gerar QR Code PIX</button><div id="pixbox" style="margin-top:15px"></div></div><div class="panel"><h2>Minhas páginas</h2>${projects.length?`<table class="table"><tr><th>Página</th><th>Status</th><th>Ação</th></tr>${projects.map(p=>`<tr><td>${p.title}<br><small class="muted">/p/${p.slug}</small></td><td>${p.status}</td><td><a class="btn small" href="#p/${p.slug}">Ver</a></td></tr>`).join('')}</table>`:'<div class="empty">Nenhuma página criada ainda.</div>'}</div></div></div></section>${footer()}`}
async function createPage(e){e.preventDefault();const d=Object.fromEntries(new FormData(e.target)); try{const r=await api('projects',{method:'POST',body:JSON.stringify(d)});toast('Página publicada.');location.hash='p/'+r.project.slug}catch(err){toast(err.message)}}
async function createPix(plan){try{const r=await api('payments/pix',{method:'POST',body:JSON.stringify({plan})});const p=r.payment;$('#pixbox').innerHTML=`<div class="qrbox">${p.qr_code?`<img alt="QR Code PIX" style="max-width:220px" src="data:image/png;base64,${p.qr_code}">`:'<h3>PIX copia e cola</h3>'}<textarea class="input" style="color:#111;background:#f4f4f4" rows="5" readonly>${p.pix_code||''}</textarea><button class="btn green" onclick="navigator.clipboard.writeText('${(p.pix_code||'').replace(/'/g,'')}');toast('PIX copiado')">Copiar PIX</button><p>Status: ${p.status}</p></div>`}catch(err){toast(err.message)}}
async function publicPage(slug){try{const r=await api('public/project/'+slug);const p=r.project;return `${header()}<section class="screen active"><div class="wrap" style="max-width:900px"><div class="published"><div class="pubhero"><h2>${p.headline}</h2><p>${p.copy}</p><a class="pubcta" target="_blank" onclick="api('public/lead/${slug}',{method:'POST'}).catch(()=>{})" href="https://wa.me/55${(p.whats||'').replace(/\D/g,'')}?text=Olá, vim pela página ${encodeURIComponent(p.title)}">Chamar no WhatsApp</a></div><div class="pubbody"><h2>${p.title}</h2><p>Atendimento profissional, apresentação clara e foco em resultado.</p><div class="cards"><div class="card"><h3>Confiança</h3><p>Informações diretas e visual premium.</p></div><div class="card"><h3>Contato rápido</h3><p>Cliente chama direto no WhatsApp.</p></div><div class="card"><h3>Conversão</h3><p>Página estruturada para vender.</p></div></div></div></div></div></section>${footer()}`}catch{return `${header()}<section class="wrap hero"><div class="panel"><h2>Página não encontrada</h2><a class="btn" href="#home">Voltar</a></div></section>`}}
function adminLogin(){return `${header()}<section class="screen active"><div class="wrap" style="max-width:660px"><div class="panel"><h2>Admin</h2><form class="form" onsubmit="doLogin(event)"><label>E-mail<input class="input" type="email" name="email" value="${ADMIN_EMAIL}" required></label>${passField('password','Senha do admin')}<button class="btn primary">Entrar</button></form></div></div></section>${footer()}`}
async function adminPanel(){try{const s=await api('admin/stats'), u=await api('admin/users'), p=await api('admin/payments'), l=await api('admin/logs'); state.admin={...s, ...u, ...p, ...l}}catch{location.hash='admin';return ''} const a=state.admin; return `${header()}<section class="screen active"><div class="wrap"><div class="appbar"><div><h2>Painel administrativo</h2><p class="muted">Controle profissional da plataforma.</p></div><button class="btn" onclick="logout()">Sair</button></div><div class="layout"><aside class="panel side"><div class="brand"><div class="logo" style="width:48px;height:48px;font-size:22px">L</div><div><b>LumaPage Admin</b><br><span class="muted">Enterprise</span></div></div><div class="menu"><button class="btn active">Dashboard</button><button class="btn">Clientes</button><button class="btn">Pagamentos</button><button class="btn">Logs</button></div></aside><main class="panel"><div class="stats"><div class="card"><span class="muted">Clientes</span><h2>${a.stats.users}</h2></div><div class="card"><span class="muted">Páginas</span><h2>${a.stats.projects}</h2></div><div class="card"><span class="muted">Receita</span><h2>${money(a.stats.revenue)}</h2></div></div><br><h2>Clientes</h2><table class="table"><tr><th>Nome</th><th>E-mail</th><th>Plano</th><th>Status</th></tr>${(a.users||[]).map(x=>`<tr><td>${x.name}</td><td>${x.email}</td><td>${x.plan}</td><td>${x.status}</td></tr>`).join('')}</table><h2>Pagamentos</h2><table class="table"><tr><th>ID</th><th>Plano</th><th>Valor</th><th>Status</th></tr>${(a.payments||[]).map(x=>`<tr><td>${x.payment_id||x.id}</td><td>${x.plan}</td><td>${money(x.amount)}</td><td>${x.status}</td></tr>`).join('')}</table></main></div></div></section>${footer()}`}
function logout(){localStorage.removeItem('lp_token'); token=''; user=null; location.hash='home'}
async function render(){let h=location.hash.replace('#','')||'home'; let html=''; if(h==='home')html=home(); else if(h==='signup')html=signup(); else if(h==='login')html=login(); else if(h==='forgot')html=forgot(); else if(h.startsWith('reset/'))html=reset(h.split('/')[1]); else if(h==='dashboard')html=await dashboard(); else if(h==='admin')html=adminLogin(); else if(h==='admin-panel')html=await adminPanel(); else if(h.startsWith('p/'))html=await publicPage(h.split('/')[1]); else html=home(); $('#app').innerHTML=html; document.querySelectorAll('.pass-input').forEach(checkStrength)}
window.addEventListener('hashchange',render); render();
</script></body></html>
