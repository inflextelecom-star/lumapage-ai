<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>LumaPage AI — Plataforma premium de páginas com IA</title>
<style>
:root{--bg:#070a14;--panel:#101726;--panel2:#121c30;--line:rgba(255,255,255,.12);--muted:#aab3cc;--text:#f7f9ff;--brand:#8b5cf6;--brand2:#18d6ff;--ok:#26e58a;--warn:#ffc65a;--danger:#ff5c7a;--shadow:0 22px 70px rgba(0,0,0,.45);--r:28px}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:radial-gradient(circle at 15% 0%,rgba(139,92,246,.38),transparent 32%),radial-gradient(circle at 90% 8%,rgba(24,214,255,.24),transparent 32%),linear-gradient(180deg,#060814,#0b1020 58%,#070a14);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif;overflow-x:hidden}body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:80px 80px;mask-image:linear-gradient(#000,transparent 90%);pointer-events:none}.wrap{width:min(1180px,calc(100% - 38px));margin:auto}.top{padding:26px 0;position:relative}.nav{display:flex;align-items:center;justify-content:space-between;gap:16px}.brand{display:flex;align-items:center;gap:14px}.logo{width:62px;height:62px;border-radius:18px;background:linear-gradient(135deg,#18d6ff,#8b5cf6 60%,#ff4edb);display:grid;place-items:center;font-weight:900;font-size:30px;box-shadow:0 20px 50px rgba(139,92,246,.35)}.brand h1{font-size:28px;margin:0;letter-spacing:-1px}.brand p{margin:2px 0 0;color:var(--muted);font-weight:700}.navlinks{display:flex;gap:10px;align-items:center}.btn{border:0;border-radius:18px;padding:15px 20px;background:rgba(255,255,255,.08);color:#fff;font-weight:900;cursor:pointer;box-shadow:inset 0 0 0 1px var(--line);transition:.2s;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn:hover{transform:translateY(-2px);box-shadow:0 18px 40px rgba(0,0,0,.28),inset 0 0 0 1px rgba(255,255,255,.2)}.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));box-shadow:0 18px 50px rgba(24,214,255,.22)}.green{background:linear-gradient(135deg,#16c784,#23ee8b);color:#032312}.danger{background:linear-gradient(135deg,#ff436b,#ff8a65)}.ghost{background:rgba(255,255,255,.055)}.small{padding:10px 13px;border-radius:13px;font-size:13px}.hero{padding:44px 0 72px}.grid{display:grid;grid-template-columns:1.03fr .97fr;gap:28px;align-items:center}.badge{display:inline-flex;padding:12px 18px;border-radius:99px;background:rgba(255,255,255,.07);box-shadow:inset 0 0 0 1px var(--line);font-weight:900;color:#dfe8ff}.hero h2{font-size:clamp(46px,8vw,92px);line-height:.94;letter-spacing:-5px;margin:24px 0 22px}.grad{background:linear-gradient(135deg,#b6f7ff,#f58aff 58%,#ffd66b);-webkit-background-clip:text;background-clip:text;color:transparent}.hero p{font-size:24px;line-height:1.55;color:#c3cae0;margin:0 0 24px}.actions{display:flex;gap:12px;flex-wrap:wrap}.trust{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}.pill{padding:12px 15px;border-radius:99px;background:rgba(255,255,255,.06);box-shadow:inset 0 0 0 1px var(--line);color:#e8edff;font-weight:800}.mock{border-radius:34px;background:linear-gradient(180deg,rgba(255,255,255,.1),rgba(255,255,255,.04));box-shadow:var(--shadow),inset 0 0 0 1px rgba(255,255,255,.16);padding:18px;position:relative;overflow:hidden}.mock:before{content:"";position:absolute;inset:-100px;background:radial-gradient(circle at 70% 0%,rgba(24,214,255,.25),transparent 32%),radial-gradient(circle at 0% 30%,rgba(139,92,246,.28),transparent 30%);pointer-events:none}.browser{position:relative;background:#07101e;border-radius:24px;overflow:hidden;box-shadow:inset 0 0 0 1px var(--line)}.browserbar{height:54px;display:flex;align-items:center;gap:8px;padding:0 18px;background:rgba(255,255,255,.06)}.dot{width:12px;height:12px;border-radius:50%;background:#ff5f56}.dot:nth-child(2){background:#ffbd2e}.dot:nth-child(3){background:#27c93f}.url{margin-left:10px;color:#92a3c7;font-weight:800}.dash{padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:14px}.metric{background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.045));border:1px solid var(--line);border-radius:20px;padding:18px}.metric b{font-size:30px}.metric span{color:var(--muted);font-weight:800}.chart{grid-column:1/-1;height:190px;border-radius:24px;background:linear-gradient(180deg,rgba(24,214,255,.10),rgba(24,214,255,.03));position:relative;overflow:hidden;border:1px solid var(--line)}.chart svg{width:100%;height:100%}.list{grid-column:1/-1;display:grid;gap:10px}.row{display:flex;align-items:center;justify-content:space-between;gap:12px;background:rgba(255,255,255,.055);border:1px solid var(--line);border-radius:18px;padding:14px}.status{padding:9px 12px;border-radius:99px;background:var(--ok);color:#041a0e;font-weight:900}.section{padding:70px 0}.section h3{font-size:clamp(34px,5vw,62px);letter-spacing:-2px;line-height:1.05;margin:0 0 14px;text-align:center}.section>div>p.lead{text-align:center;font-size:22px;color:#c1c9df;max-width:780px;margin:0 auto 34px;line-height:1.5}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.card{background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.04));border:1px solid var(--line);border-radius:28px;padding:24px;box-shadow:0 14px 45px rgba(0,0,0,.22)}.card .ico{width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:grid;place-items:center;font-size:25px;margin-bottom:18px}.card h4{font-size:24px;margin:0 0 10px}.card p{color:#c2c9dc;line-height:1.5;margin:0}.plans{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.plan{padding:24px;border-radius:28px;background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.045));border:1px solid var(--line);position:relative}.plan.pro{border-color:rgba(24,214,255,.45);box-shadow:0 25px 70px rgba(24,214,255,.16)}.tag{position:absolute;right:18px;top:-13px;background:linear-gradient(135deg,var(--brand),var(--brand2));border-radius:99px;padding:8px 12px;font-weight:900}.price{font-size:46px;font-weight:950;margin:14px 0}.price small{font-size:16px;color:var(--muted)}ul{padding-left:18px;color:#d9def0;line-height:2}.footer{padding:50px 0;color:#96a1bd;border-top:1px solid var(--line)}.footer .footrow{display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap}.adminlink{font-size:13px;color:#59657f;text-decoration:none}.adminlink:hover{color:#fff}.screen{display:none;min-height:100vh;padding:26px 0 70px}.screen.active{display:block}.panel{background:rgba(8,14,27,.78);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:30px;padding:24px}.form{display:grid;gap:14px}.input,label select,textarea{width:100%;background:#07101e;border:1px solid rgba(255,255,255,.13);color:#fff;border-radius:16px;padding:15px 16px;font-size:16px;outline:none}label{display:grid;gap:7px;color:#cfd6ea;font-weight:900}.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}.appbar{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:18px}.layout{display:grid;grid-template-columns:275px 1fr;gap:18px}.side{position:sticky;top:18px;height:max-content}.menu{display:grid;gap:8px;margin-top:20px}.menu button{justify-content:flex-start}.menu button.active{background:linear-gradient(135deg,rgba(139,92,246,.8),rgba(24,214,255,.28))}.content{min-width:0}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.table{width:100%;border-collapse:separate;border-spacing:0 10px}.table th{color:#9eabc9;text-align:left;font-size:13px;padding:0 12px}.table td{background:rgba(255,255,255,.055);padding:15px 12px;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}.table td:first-child{border-left:1px solid var(--line);border-radius:16px 0 0 16px}.table td:last-child{border-right:1px solid var(--line);border-radius:0 16px 16px 0}.tab{display:none}.tab.active{display:block}.empty{padding:28px;border-radius:22px;border:1px dashed rgba(255,255,255,.18);text-align:center;color:#aeb8d2;background:rgba(255,255,255,.035)}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:20;background:#101a2e;color:#fff;padding:14px 18px;border-radius:18px;box-shadow:var(--shadow);display:none;max-width:92%;font-weight:900}.toast.show{display:block}.published{border-radius:24px;overflow:hidden;background:#fff;color:#111}.pubHero{padding:50px;background:linear-gradient(135deg,#111827,#2d1b69);color:#fff}.pubHero h2{font-size:42px;margin:0 0 12px}.pubBody{padding:28px;display:grid;gap:18px}.pubCTA{background:#18d66b;color:#052515;border-radius:16px;padding:14px 16px;font-weight:950;text-align:center;text-decoration:none}.mobileOnly{display:none}.loaderSteps{display:grid;gap:10px}.step{padding:13px;border-radius:16px;background:rgba(255,255,255,.055);border:1px solid var(--line);color:#bfc9e4}.step.done{color:#fff;border-color:rgba(38,229,138,.45)}
@media(max-width:850px){.wrap{width:min(100% - 28px,720px)}.nav{align-items:flex-start}.navlinks{display:none}.mobileOnly{display:flex}.grid,.cards,.plans,.layout,.two{grid-template-columns:1fr}.hero{padding-top:20px}.hero h2{font-size:58px;letter-spacing:-3px}.hero p{font-size:20px}.actions .btn{width:100%;font-size:18px;padding:18px}.trust .pill{font-size:14px}.dash{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}.side{position:relative;top:auto}.menu{grid-template-columns:1fr 1fr}.table{font-size:13px}.table th:nth-child(3),.table td:nth-child(3){display:none}.section{padding:44px 0}.brand h1{font-size:26px}.brand p{font-size:14px}}
@media(max-width:480px){.hero h2{font-size:46px}.logo{width:56px;height:56px}.stats{grid-template-columns:1fr}.menu{grid-template-columns:1fr}.brand h1{font-size:24px}.mock{padding:10px}.dash{padding:14px}.top{padding:18px 0}.section h3{text-align:left}.section>div>p.lead{text-align:left}.card,.plan,.panel{border-radius:24px}}
</style>
</head>
<body>
<div id="app"></div><div id="toast" class="toast"></div>
<script>
const ADMIN_EMAIL='Varejaoeverton@gmail.com';
const ADMIN_PASSWORD='Enzo777.@';
const SUPPORT_WHATS='81985745430';
const LS='lumapage_operacional_v2';
function now(){return new Date().toISOString()} function id(){return Math.random().toString(36).slice(2,10)}
function money(v){return (Number(v)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function slugify(s){return (s||'pagina').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,60)||'pagina'}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600)}
function load(){let d=localStorage.getItem(LS); if(d) return JSON.parse(d); const base={settings:{brand:'LumaPage AI',support:SUPPORT_WHATS,theme:'premium',geminiKey:'',mpToken:'',webhookSecret:'',maintenance:false},users:[],pages:[],payments:[],plans:[{id:'starter',name:'Inicial',price:9.90,limit:1,features:['1 página publicada','Botão WhatsApp','Templates essenciais']},{id:'pro',name:'Pro',price:19.90,limit:5,features:['5 páginas','Analytics básico','Sem marca LumaPage']},{id:'business',name:'Business',price:39.90,limit:20,features:['20 páginas','Domínio próprio','Prioridade no suporte']}],logs:[],sessions:{client:null,admin:false}}; save(base); return base}
function save(d){localStorage.setItem(LS,JSON.stringify(d))} let db=load();
function log(msg,type='info'){db.logs.unshift({id:id(),msg,type,date:now()});db.logs=db.logs.slice(0,100);save(db)}
function q(sel){return document.querySelector(sel)} function qs(sel){return [...document.querySelectorAll(sel)]}
function render(){const route=location.hash.replace('#','')||'home'; const app=document.getElementById('app'); if(route.startsWith('p/')) return app.innerHTML=published(route.split('/')[1]); if(route==='login') return app.innerHTML=login(); if(route==='signup') return app.innerHTML=signup(); if(route==='dashboard') return app.innerHTML=clientDash(); if(route==='admin') return app.innerHTML=adminLogin(); if(route==='admin-panel') return app.innerHTML=adminPanel(); app.innerHTML=home()}
window.addEventListener('hashchange',render);
function header(showLinks=true){return `<header class="top"><div class="wrap nav"><a class="brand" href="#home" style="text-decoration:none;color:inherit"><div class="logo">L</div><div><h1>${db.settings.brand}</h1><p>Plataforma premium de páginas com IA</p></div></a>${showLinks?`<div class="navlinks"><a class="btn ghost" href="#login">Cliente entrar</a><a class="btn primary" href="#signup">Criar conta</a></div>`:''}</div></header>`}
function home(){return `${header(true)}<main><section class="hero"><div class="wrap grid"><div><span class="badge">Plataforma profissional para negócios venderem online</span><h2>Crie páginas de venda com <span class="grad">IA em minutos.</span></h2><p>Seu cliente informa o negócio, objetivo e contato. A plataforma cria uma landing page bonita, otimizada para conversão, com publicação rápida e painel para acompanhar resultados.</p><div class="actions"><a class="btn primary" href="#signup">Criar minha conta</a><a class="btn ghost" href="#login">Já tenho conta</a><a class="btn green" href="https://wa.me/55${db.settings.support}" target="_blank">Suporte WhatsApp</a></div><div class="trust"><span class="pill">Publicação rápida</span><span class="pill">Painel para clientes</span><span class="pill">Templates profissionais</span><span class="pill">Analytics de conversão</span></div></div><div class="mock"><div class="browser"><div class="browserbar"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="url">app.lumapage.ai/dashboard</span></div><div class="dash"><div class="metric"><span>Páginas criadas</span><br><b>${db.pages.length}</b></div><div class="metric"><span>Clientes cadastrados</span><br><b>${db.users.length}</b></div><div class="metric"><span>Receita confirmada</span><br><b>${money(db.payments.filter(p=>p.status==='approved').reduce((a,p)=>a+p.amount,0))}</b></div><div class="metric"><span>Publicadas</span><br><b>${db.pages.filter(p=>p.status==='published').length}</b></div><div class="chart"><svg viewBox="0 0 700 220" preserveAspectRatio="none"><path d="M0 170 C80 130 120 90 200 110 C300 136 330 55 430 72 C520 88 540 35 700 54 L700 220 L0 220 Z" fill="rgba(38,229,138,.18)"/><path d="M0 170 C80 130 120 90 200 110 C300 136 330 55 430 72 C520 88 540 35 700 54" stroke="#26e58a" stroke-width="9" fill="none" stroke-linecap="round"/></svg></div><div class="list">${db.pages.slice(0,3).map(p=>`<div class="row"><div><b>${p.title}</b><br><span style="color:var(--muted)">${p.status==='published'?'Publicada':'Rascunho'} · ${p.visits||0} visitas · ${p.leads||0} leads</span></div><span class="status">${p.status==='published'?'Ativa':'Pronta'}</span></div>`).join('')||`<div class="empty">Quando os clientes criarem páginas, os dados aparecem aqui automaticamente.</div>`}</div></div></div></div></div></section><section class="section"><div class="wrap"><h3>Feito para vender com aparência premium</h3><p class="lead">Sem termos técnicos na vitrine pública. O cliente vê benefício, confiança, velocidade e resultado.</p><div class="cards"><div class="card"><div class="ico">🎯</div><h4>IA orientada para conversão</h4><p>Gera headline, benefícios, CTA, FAQ e página completa a partir de perguntas simples.</p></div><div class="card"><div class="ico">🧩</div><h4>Templates por nicho</h4><p>Modelos para estética, delivery, clínica, loja, curso, afiliado, barbearia e outros segmentos.</p></div><div class="card"><div class="ico">📊</div><h4>Painel e resultados</h4><p>Visitas, cliques, leads, status da página e controle de publicação para cada cliente.</p></div></div></div></section><section class="section" id="planos"><div class="wrap"><h3>Planos simples para começar barato</h3><p class="lead">Preço acessível para começar, com espaço para aumentar depois.</p><div class="plans">${db.plans.map((p,i)=>`<div class="plan ${i===1?'pro':''}">${i===1?'<span class="tag">Mais escolhido</span>':''}<h4>${p.name}</h4><div class="price">${money(p.price)} <small>/mês</small></div><ul>${p.features.map(f=>`<li>${f}</li>`).join('')}</ul><a href="#signup" class="btn ${i===1?'primary':'ghost'}" style="width:100%">Começar</a></div>`).join('')}</div></div></section></main>${footer()}`}
function footer(){return `<footer class="footer"><div class="wrap footrow"><div><b>${db.settings.brand}</b><br><span>Plataforma de landing pages com IA.</span></div><div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap"><a class="adminlink" href="#admin">Admin</a><a class="adminlink" href="#login">Cliente entrar</a><a class="adminlink" href="https://wa.me/55${db.settings.support}" target="_blank">Suporte</a></div></div></footer>`}
function signup(){return `${header(false)}<section class="screen active"><div class="wrap" style="max-width:760px"><div class="panel"><h2>Criar conta do cliente</h2><p style="color:var(--muted)">O cliente se cadastra, escolhe plano e entra no dashboard.</p><form class="form" onsubmit="doSignup(event)"><div class="two"><label>Nome completo<input class="input" name="name" required></label><label>WhatsApp<input class="input" name="phone" required placeholder="(81) 99999-9999"></label></div><label>E-mail<input class="input" type="email" name="email" required></label><label>Senha<input class="input" type="password" name="password" required minlength="4"></label><label>Plano<select name="plan">${db.plans.map(p=>`<option value="${p.id}">${p.name} — ${money(p.price)}/mês</option>`).join('')}</select></label><button class="btn primary" type="submit">Criar conta e acessar</button><a class="btn ghost" href="#login">Já tenho conta</a></form></div></div></section>`}
function login(){return `${header(false)}<section class="screen active"><div class="wrap" style="max-width:660px"><div class="panel"><h2>Cliente entrar</h2><p style="color:var(--muted)">Entre com a conta cadastrada para acessar o dashboard.</p><form class="form" onsubmit="doLogin(event)"><label>E-mail<input class="input" type="email" name="email" required></label><label>Senha<input class="input" type="password" name="password" required></label><button class="btn primary" type="submit">Entrar no dashboard</button><a class="btn ghost" href="#signup">Criar conta</a></form></div></div></section>`}
function adminLogin(){return `${header(false)}<section class="screen active"><div class="wrap" style="max-width:660px"><div class="panel"><h2>Admin</h2><p style="color:var(--muted)">Área privada do administrador.</p><form class="form" onsubmit="doAdmin(event)"><label>E-mail<input class="input" type="email" name="email" required value="${ADMIN_EMAIL}"></label><label>Senha<input class="input" type="password" name="password" required></label><button class="btn primary" type="submit">Entrar no admin</button><a href="#home" class="btn ghost">Voltar</a></form></div></div></section>`}
function doSignup(e){e.preventDefault();const f=Object.fromEntries(new FormData(e.target)); if(db.users.some(u=>u.email.toLowerCase()===f.email.toLowerCase())) return toast('E-mail já cadastrado.'); const u={id:id(),name:f.name,email:f.email.toLowerCase(),phone:f.phone,password:f.password,plan:f.plan,status:'active',created:now()}; db.users.push(u); db.sessions.client=u.id; log('Novo cliente cadastrado: '+u.email,'user'); save(db); location.hash='dashboard'}
function doLogin(e){e.preventDefault();const f=Object.fromEntries(new FormData(e.target)); const u=db.users.find(u=>u.email.toLowerCase()===f.email.toLowerCase()&&u.password===f.password); if(!u) return toast('Login ou senha inválidos.'); db.sessions.client=u.id; save(db); location.hash='dashboard'}
function doAdmin(e){e.preventDefault();const f=Object.fromEntries(new FormData(e.target)); if(f.email.toLowerCase()!==ADMIN_EMAIL.toLowerCase()||f.password!==ADMIN_PASSWORD) return toast('Admin inválido.'); db.sessions.admin=true; log('Admin autenticado','security'); save(db); location.hash='admin-panel'}
function currentUser(){return db.users.find(u=>u.id===db.sessions.client)}
function clientDash(){const u=currentUser(); if(!u) return login(); const pages=db.pages.filter(p=>p.userId===u.id); const pay=db.payments.filter(p=>p.userId===u.id); return `${header(false)}<section class="screen active"><div class="wrap"><div class="appbar"><div><h2>Dashboard do cliente</h2><p style="color:var(--muted)">Olá, ${u.name}. Gerencie suas páginas e plano.</p></div><button class="btn ghost" onclick="logout()">Sair</button></div><div class="stats"><div class="card"><span>Páginas</span><h2>${pages.length}</h2></div><div class="card"><span>Publicadas</span><h2>${pages.filter(p=>p.status==='published').length}</h2></div><div class="card"><span>Visitas</span><h2>${pages.reduce((a,p)=>a+(p.visits||0),0)}</h2></div><div class="card"><span>Leads</span><h2>${pages.reduce((a,p)=>a+(p.leads||0),0)}</h2></div></div><br><div class="grid" style="align-items:start"><div class="panel"><h3>Gerar nova página com IA</h3><form class="form" onsubmit="generatePage(event)"><label>Nome do negócio<input class="input" name="business" required placeholder="Ex: Barbearia Prime"></label><label>Segmento<select name="segment"><option>Barbearia</option><option>Clínica</option><option>Delivery</option><option>Loja</option><option>Curso</option><option>Serviços</option></select></label><label>Objetivo<textarea name="goal" rows="3" placeholder="Atrair clientes pelo WhatsApp" required></textarea></label><label>WhatsApp da página<input name="whats" class="input" value="${u.phone}" required></label><button class="btn primary" type="submit">Gerar e publicar</button></form><div id="aiSteps" style="margin-top:14px"></div></div><div class="panel"><h3>Minhas páginas</h3>${pages.length?`<table class="table"><tr><th>Página</th><th>Status</th><th>Ações</th></tr>${pages.map(p=>`<tr><td>${p.title}<br><small style="color:var(--muted)">/p/${p.slug}</small></td><td>${p.status}</td><td><a class="btn small" href="#p/${p.slug}">Ver</a></td></tr>`).join('')}</table>`:`<div class="empty">Nenhuma página criada ainda.</div>`}<h3>Plano</h3><p style="color:var(--muted)">Plano atual: <b style="color:#fff">${db.plans.find(p=>p.id===u.plan)?.name||'Sem plano'}</b></p><button class="btn green" onclick="simulatePayment('${u.id}')">Simular pagamento aprovado no preview</button></div></div></div></section>`}
function generatePage(e){e.preventDefault();const u=currentUser(); const f=Object.fromEntries(new FormData(e.target)); const steps=q('#aiSteps'); steps.innerHTML=`<div class="loaderSteps"><div class="step">Analisando nicho...</div><div class="step">Criando copy de venda...</div><div class="step">Montando layout...</div><div class="step">Publicando página...</div></div>`; let i=0; const interval=setInterval(()=>{const items=steps.querySelectorAll('.step'); if(items[i]) items[i].classList.add('done'); i++; if(i>items.length){clearInterval(interval); const page={id:id(),userId:u.id,title:'Landing '+f.business,slug:slugify(f.business)+'-'+id().slice(0,4),business:f.business,segment:f.segment,goal:f.goal,whats:f.whats,status:'published',visits:0,leads:0,created:now(),headline:`${f.business}: atendimento profissional para você vender mais`,copy:`Página criada para ${f.segment}, com foco em ${f.goal}.`}; db.pages.unshift(page); log('Página criada: '+page.title,'page'); save(db); toast('Página publicada com sucesso.'); location.hash='p/'+page.slug;}},550)}
function simulatePayment(userId){const u=db.users.find(x=>x.id===userId); const plan=db.plans.find(p=>p.id===u.plan); db.payments.unshift({id:id(),userId,amount:plan?.price||0,status:'approved',provider:'preview',created:now()}); log('Pagamento preview aprovado: '+u.email,'payment'); save(db); toast('Pagamento simulado aprovado.'); render()}
function logout(){db.sessions.client=null;save(db);location.hash='home'}
function published(slug){const p=db.pages.find(p=>p.slug===slug); if(!p) return `${header(false)}<div class="wrap"><div class="panel"><h2>Página não encontrada</h2><a href="#home" class="btn primary">Voltar</a></div></div>`; p.visits=(p.visits||0)+1; save(db); return `${header(false)}<section class="screen active"><div class="wrap" style="max-width:900px"><div class="published"><div class="pubHero"><h2>${p.headline}</h2><p>${p.copy}</p><a class="pubCTA" href="https://wa.me/55${(p.whats||'').replace(/\D/g,'')}?text=Olá, vim pela página ${encodeURIComponent(p.business)}" target="_blank" onclick="trackLead('${p.id}')">Chamar no WhatsApp</a></div><div class="pubBody"><h3>Por que escolher ${p.business}?</h3><p>Atendimento rápido, visual profissional e foco em resultado.</p><div class="cards"><div class="card"><h4>Atendimento</h4><p>Contato direto pelo WhatsApp.</p></div><div class="card"><h4>Confiança</h4><p>Apresentação clara e objetiva.</p></div><div class="card"><h4>Resultado</h4><p>Página pensada para conversão.</p></div></div></div></div><br><a class="btn ghost" href="#dashboard">Voltar</a></div></section>`}
function trackLead(pid){const p=db.pages.find(p=>p.id===pid); if(p){p.leads=(p.leads||0)+1;save(db)}}
function adminPanel(){if(!db.sessions.admin) return adminLogin(); const rev=db.payments.filter(p=>p.status==='approved').reduce((a,p)=>a+p.amount,0); return `${header(false)}<section class="screen active"><div class="wrap"><div class="appbar"><div><h2>Painel administrativo</h2><p style="color:var(--muted)">Controle total da plataforma.</p></div><button class="btn ghost" onclick="adminLogout()">Sair</button></div><div class="layout"><aside class="panel side"><div class="brand"><div class="logo" style="width:46px;height:46px;font-size:22px">L</div><div><b>LumaPage Admin</b><br><small style="color:var(--muted)">Administrador</small></div></div><div class="menu">${['dashboard','clientes','paginas','pagamentos','planos','ia','mercadopago','seguranca','logs','config'].map((m,i)=>`<button class="btn ghost ${i===0?'active':''}" onclick="tab('${m}',this)">${label(m)}</button>`).join('')}</div></aside><main class="content panel"><div id="tab-dashboard" class="tab active">${adminDashboard(rev)}</div><div id="tab-clientes" class="tab">${adminClients()}</div><div id="tab-paginas" class="tab">${adminPages()}</div><div id="tab-pagamentos" class="tab">${adminPayments()}</div><div id="tab-planos" class="tab">${adminPlans()}</div><div id="tab-ia" class="tab">${adminAI()}</div><div id="tab-mercadopago" class="tab">${adminMP()}</div><div id="tab-seguranca" class="tab">${adminSecurity()}</div><div id="tab-logs" class="tab">${adminLogs()}</div><div id="tab-config" class="tab">${adminConfig()}</div></main></div></div></section>`}
function label(m){return {dashboard:'Dashboard',clientes:'Clientes',paginas:'Landing Pages',pagamentos:'Pagamentos',planos:'Planos',ia:'IA / Gemini',mercadopago:'Mercado Pago',seguranca:'Segurança',logs:'Logs',config:'Configurações'}[m]}
function tab(name,btn){qs('.tab').forEach(x=>x.classList.remove('active')); q('#tab-'+name).classList.add('active'); qs('.menu button').forEach(x=>x.classList.remove('active')); btn.classList.add('active')}
function adminDashboard(rev){return `<h2>Dashboard operacional</h2><div class="stats"><div class="card"><span>Clientes</span><h2>${db.users.length}</h2></div><div class="card"><span>Páginas</span><h2>${db.pages.length}</h2></div><div class="card"><span>Pagamentos</span><h2>${db.payments.length}</h2></div><div class="card"><span>Receita</span><h2>${money(rev)}</h2></div></div><br><div class="chart"><svg viewBox="0 0 700 220" preserveAspectRatio="none"><path d="M0 170 C120 160 130 70 240 92 C360 115 390 50 500 65 C585 75 610 38 700 42" stroke="#18d6ff" stroke-width="8" fill="none" stroke-linecap="round"/><path d="M0 170 C120 160 130 70 240 92 C360 115 390 50 500 65 C585 75 610 38 700 42 L700 220 L0 220 Z" fill="rgba(24,214,255,.12)"/></svg></div><br><div class="empty">Os números acima são calculados pelos dados reais salvos no sistema, sem valores fixos.</div>`}
function adminClients(){return `<h2>Clientes</h2>${db.users.length?`<table class="table"><tr><th>Cliente</th><th>Plano</th><th>Status</th><th>Ações</th></tr>${db.users.map(u=>`<tr><td>${u.name}<br><small style="color:var(--muted)">${u.email} · ${u.phone}</small></td><td>${db.plans.find(p=>p.id===u.plan)?.name||'-'}</td><td>${u.status}</td><td><button class="btn small" onclick="toggleUser('${u.id}')">${u.status==='active'?'Bloquear':'Ativar'}</button><button class="btn small danger" onclick="delUser('${u.id}')">Excluir</button></td></tr>`).join('')}</table>`:`<div class="empty">Nenhum cliente cadastrado.</div>`}`}
function adminPages(){return `<h2>Landing Pages</h2>${db.pages.length?`<table class="table"><tr><th>Página</th><th>Dono</th><th>Status</th><th>Ações</th></tr>${db.pages.map(p=>{const u=db.users.find(u=>u.id===p.userId);return `<tr><td>${p.title}<br><small style="color:var(--muted)">/p/${p.slug}</small></td><td>${u?.name||'Removido'}</td><td>${p.status}</td><td><a class="btn small" href="#p/${p.slug}">Abrir</a><button class="btn small danger" onclick="delPage('${p.id}')">Excluir</button></td></tr>`}).join('')}</table>`:`<div class="empty">Nenhuma landing page criada.</div>`}`}
function adminPayments(){return `<h2>Pagamentos</h2>${db.payments.length?`<table class="table"><tr><th>Cliente</th><th>Valor</th><th>Status</th><th>Data</th></tr>${db.payments.map(p=>{const u=db.users.find(u=>u.id===p.userId);return `<tr><td>${u?.email||'Cliente removido'}</td><td>${money(p.amount)}</td><td>${p.status}</td><td>${new Date(p.created).toLocaleString('pt-BR')}</td></tr>`}).join('')}</table>`:`<div class="empty">Nenhum pagamento registrado.</div>`}`}
function adminPlans(){return `<h2>Planos</h2><div class="cards">${db.plans.map(p=>`<div class="card"><h4>${p.name}</h4><label>Preço<input class="input" type="number" step="0.01" value="${p.price}" onchange="editPlan('${p.id}','price',this.value)"></label><label>Limite de páginas<input class="input" type="number" value="${p.limit}" onchange="editPlan('${p.id}','limit',this.value)"></label><button class="btn primary" onclick="toast('Plano salvo')">Salvar plano</button></div>`).join('')}</div>`}
function adminAI(){return `<h2>IA / Gemini</h2><div class="card"><p style="color:var(--muted)">No preview local, você pode salvar a chave para testar a interface. Em produção, use Cloudflare Secrets para segurança.</p><button class="btn primary" onclick="enableSecret('geminiBox')">Habilitar edição da chave Gemini</button><div id="geminiBox" style="display:none;margin-top:14px"><label>Gemini API Key<input class="input" id="geminiKey" value="${db.settings.geminiKey||''}" placeholder="Cole sua chave Gemini"></label><button class="btn green" onclick="saveSetting('geminiKey',q('#geminiKey').value)">Salvar chave Gemini</button><button class="btn ghost" onclick="testAI()">Testar conexão IA</button></div></div>`}
function adminMP(){return `<h2>Mercado Pago</h2><div class="card"><p style="color:var(--muted)">Configure token, webhook secret e teste o status da integração.</p><button class="btn primary" onclick="enableSecret('mpBox')">Habilitar edição Mercado Pago</button><div id="mpBox" style="display:none;margin-top:14px"><label>Access Token<input class="input" id="mpToken" value="${db.settings.mpToken||''}" placeholder="APP_USR..."></label><label>Webhook Secret<input class="input" id="webhookSecret" value="${db.settings.webhookSecret||''}" placeholder="segredo do webhook"></label><button class="btn green" onclick="saveMP()">Salvar Mercado Pago</button><button class="btn ghost" onclick="testMP()">Testar integração</button></div></div>`}
function adminSecurity(){return `<h2>Segurança</h2><div class="cards"><div class="card"><h4>Admin</h4><p>Autenticado nesta sessão.</p></div><div class="card"><h4>Rate limit</h4><p>Preparado no Worker de produção.</p></div><div class="card"><h4>Secrets</h4><p>Chaves reais devem ficar no Cloudflare.</p></div></div>`}
function adminLogs(){return `<h2>Logs</h2>${db.logs.length?`<table class="table"><tr><th>Tipo</th><th>Mensagem</th><th>Data</th></tr>${db.logs.map(l=>`<tr><td>${l.type}</td><td>${l.msg}</td><td>${new Date(l.date).toLocaleString('pt-BR')}</td></tr>`).join('')}</table>`:`<div class="empty">Sem logs ainda.</div>`}`}
function adminConfig(){return `<h2>Configurações gerais</h2><div class="form"><label>Nome da plataforma<input class="input" id="brandName" value="${db.settings.brand}"></label><label>WhatsApp suporte<input class="input" id="supportNumber" value="${db.settings.support}"></label><button class="btn primary" onclick="saveGeneral()">Salvar configurações</button></div>`}
function enableSecret(id){q('#'+id).style.display='block';toast('Edição habilitada')}
function saveSetting(k,v){db.settings[k]=v;log('Configuração salva: '+k,'config');save(db);toast('Chave salva no preview')}
function saveMP(){db.settings.mpToken=q('#mpToken').value;db.settings.webhookSecret=q('#webhookSecret').value;log('Mercado Pago atualizado','config');save(db);toast('Mercado Pago salvo no preview')}
function testAI(){toast(db.settings.geminiKey?'IA configurada no preview':'Informe uma chave primeiro')}
function testMP(){toast(db.settings.mpToken?'Mercado Pago configurado no preview':'Informe o token primeiro')}
function saveGeneral(){db.settings.brand=q('#brandName').value||'LumaPage AI';db.settings.support=(q('#supportNumber').value||SUPPORT_WHATS).replace(/\D/g,'');save(db);toast('Configurações salvas');render()}
function editPlan(pid,k,v){const p=db.plans.find(p=>p.id===pid); if(p){p[k]=k==='price'?Number(v):Number(v);save(db);log('Plano editado: '+p.name,'plan')}}
function toggleUser(uid){const u=db.users.find(u=>u.id===uid); if(u){u.status=u.status==='active'?'blocked':'active';save(db);render();setTimeout(()=>{location.hash='admin-panel'},0)}}
function delUser(uid){if(!confirm('Excluir cliente?'))return; db.users=db.users.filter(u=>u.id!==uid); db.pages=db.pages.filter(p=>p.userId!==uid); db.payments=db.payments.filter(p=>p.userId!==uid); save(db);render()}
function delPage(pid){if(!confirm('Excluir página?'))return; db.pages=db.pages.filter(p=>p.id!==pid); save(db);render()}
function adminLogout(){db.sessions.admin=false;save(db);location.hash='home'}
render();
</script>
</body>
</html>
